<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Twitto - Connect to Community! Create your admin account today.">
    <title>Admin Signup - Twitto</title>
    <link rel="icon" type="image/webp" sizes="256x256" href="/Barlogo.webp?v=2" th:href="@{/Barlogo.webp(v=2)}">
    <link rel="shortcut icon" href="/Barlogo.webp?v=2" th:href="@{/Barlogo.webp(v=2)}">
    <link rel="apple-touch-icon" href="/Barlogo.webp?v=2" th:href="@{/Barlogo.webp(v=2)}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

<!--        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }-->
        @keyframes floatLogo {
        0% {
        transform: translateY(0px) rotate(0deg);
        }
        50% {
        transform: translateY(-10px) rotate(2deg);
        }
        100% {
        transform: translateY(0px) rotate(0deg);
        }
    }

     <!--   @keyframes blurPulse {
            0% { filter: blur(0.5px) drop-shadow(0 0 5px #00c3ff); }
             50% { filter: blur(1px) drop-shadow(0 0 15px #00c3ff); }
                100% { filter: blur(0.5px) drop-shadow(0 0 5px #00c3ff); }
        }-->



        body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: url('/bg.webp') center/cover no-repeat ;
        background-size: calc(100% + 5px) calc(100% + 5px);
        background-color: white;
        position: relative;
        overflow-x: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
         min-height: 110vh;
        }


        body::before {
        content: '';
        position: fixed;
        inset: 0;
<!--        background: url('/bg_result.webp') center/cover no-repeat;-->
        background-size: calc(100% + 3px) calc(100% + 3px);
<!--        filter: blur(100px);        /* 🔥 MAIN BLUR */-->
<!--        transform: scale(1.1);     /* fix blur edges */-->
        z-index: -2;
        }


        body::after {
        content: '';
        position: fixed;
        inset: 0;
        background:
        radial-gradient(circle at 20% 50%, rgba(42, 82, 152, 0.3), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(30, 60, 114, 0.3), transparent 50%);
        z-index: -1;
        }
        .container {
             width: 100%;
             height: 100vh;
             display: flex;
             align-items: center;
             justify-content: space-between;
             padding: 40px 120px 80px;
             min-height: 100vh;
        }

        /* LEFT SIDE (LOGO) */

       .logo-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            gap: 15px;
            left padding:5px;
       }

        .logo { width: 1000px;
            margin-bottom: 5px;
            animation: floatLogo 3s ease-in-out infinite;

            }

        .logo-side h2 {
            font-size: 42px;
            font-weight: bold;
            }
        .logo-side p {
            font-size: 16px;
            opacity: 0.8;
          }

        .card {
            background: white;
            padding: 45px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            animation: slideInUp 0.8s ease;
            border: 1px solid rgba(42, 82, 152, 0.1);
            margin-left: auto;
            margin-right: 0;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 70px rgba(30, 60, 114, 0.2);
        }

        .card-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 25px;
        }

        .card h1 {
            color: #1e3c72;
            font-size: 30px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .card h1 i {
            font-size: 32px;
        }

        .card p {
            color: #999;
            font-size: 14px;
            font-weight: 500;
            width: 350px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: #1e3c72;
            pointer-events: none;
            font-size: 15px;
        }

        input, select {
            width: 100%;
            padding: 13px 15px 13px 42px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            color: #333;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 4px rgba(42, 82, 152, 0.1);
        }

        input::placeholder {
            color: #bbb;
        }

        /* Password strength bar */
        .strength-bar {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .strength-bar span {
            height: 3px;
            flex: 1;
            border-radius: 2px;
            background: #e0e0e0;
            transition: background 0.3s ease;
        }

        .strength-bar span.weak   { background: #e74c3c; }
        .strength-bar span.medium { background: #f39c12; }
        .strength-bar span.strong { background: #27ae60; }

        .strength-label {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        /* Error & success messages */
        .messages-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }

        .error-message, .success-message {
            flex: 1;
            padding: 8px 11px;
            border-radius: 7px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 7px;
            animation: slideInDown 0.5s ease;
        }

        .error-message {
            background: #fee;
            color: #c33;
            border-left: 3px solid #c33;
        }

        .success-message {
            background: #efffef;
            color: #27ae60;
            border-left: 3px solid #27ae60;
        }

        .error-message i, .success-message i {
            font-size: 13px;
            flex-shrink: 0;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
            z-index: 0;
        }

        .btn:hover::before { left: 100%; }

        .btn-signup {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.4);
            animation: slideInUp 0.8s ease 0.2s both;
            position: relative;
            z-index: 1;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(30, 60, 114, 0.6);
        }

        .btn-signup:active { transform: translateY(0); }

        .divider {
            text-align: center;
            margin: 20px 0 0;
            color: #bbb;
            font-size: 13px;
        }

        .divider a {
            color: #2a5298;
            font-weight: 600;
            text-decoration: none;
        }

        .divider a:hover { text-decoration: underline; }

        .info-box {
            background: linear-gradient(135deg, #e8f4f8 0%, #dff0f5 100%);
            padding: 14px;
            border-radius: 8px;
            margin-top: 22px;
            border-left: 4px solid #1e3c72;
            animation: slideInDown 0.8s ease 0.1s both;
        }

        .info-box small {
            color: #666;
            font-size: 12px;
            display: block;
            margin-bottom: 4px;
        }

        .info-box strong {
            color: #1e3c72;
            font-size: 13px;
            display: block;
        }
        .copyright{
            position: fixed;
            bottom: 20px;
            left: 50%;                  /* move to center */
            transform: translateX(-50%); /* perfect center */
            text-align: center;
            color: white;
            font-size: 14px;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: black;
            font-size: 13px;
        }

        .footer-text i {
            color: #00f7ff;
            margin-right: 5px;
        }

        /* Role select icon offset tweak */
        select.with-icon {
            padding-left: 42px;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            body {
                padding: 12px 10px 20px;
                align-items: flex-start;
                justify-content: flex-start;
            }

            .logo-side {
                position: fixed;
                top: 10px;
                left: 10px;
                z-index: 10;
                width: auto;
                text-align: left;
            }

            .logo {
                width: 125px;
            }

            .container {
                display: block;
                width: 100%;
                max-width: 560px;
                height: auto;
                min-height: 0;
                margin-top: 120px;
                padding: 0;
            }

            .card {
                width: 100%;
                margin: 0 auto;
                padding: 24px 18px;
            }

            .copyright {
                position: static;
                transform: none;
                margin-top: 14px;
                font-size: 12px;
            }

            .card h1 { font-size: 26px; }
            .form-row { grid-template-columns: 1fr; gap: 0; }
            input, select { padding: 12px 12px 12px 38px; }
        }

        @media (max-width: 1024px) and (min-width: 601px) {
            .container {
                height: auto;
                min-height: 100vh;
                padding: 24px 16px 32px;
                justify-content: center;
                gap: 18px;
                flex-direction: column;
            }

            .logo-side {
                width: 100%;
                text-align: center;
            }

            .logo {
                width: min(80vw, 280px);
            }

            .card {
                width: min(100%, 560px);
                margin: 0;
                padding: 24px 18px;
            }

            .card p {
                width: auto;
            }

            .messages-row {
                flex-direction: column;
            }

            .copyright {
                position: static;
                transform: none;
                margin-top: 14px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<!-- LEFT LOGO -->
<div class="logo-side">
    <img th:src="@{/logo.png}" class="logo">
</div>

<!-- RIGHT CARD -->
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1><i class="fas fa-user-plus"></i> Create Account</h1>
            <p>Register a new admin account</p>
        </div>

        <!-- Thymeleaf messages row -->
        <th:block th:if="${error} or ${success}">
            <div class="messages-row">
                <th:block th:if="${error}">
                    <div class="error-message">
                        <i class="fas fa-exclamation-circle"></i>
                        <span th:text="${error}"></span>
                    </div>
                </th:block>
                <th:block th:if="${success}">
                    <div class="success-message">
                        <i class="fas fa-check-circle"></i>
                        <span th:text="${success}"></span>
                    </div>
                </th:block>
            </div>
        </th:block>

        <form action="/signup" th:action="@{/signup}" method="post" onsubmit="return validateForm()">

            <!-- First Name + Last Name -->
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="firstName" name="firstName"
                               placeholder="John" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="lastName" name="lastName"
                               placeholder="Doe" required>
                    </div>
                </div>
            </div>

            <!-- Username -->
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-at"></i>
                    <input type="text" id="username" name="username"
                           placeholder="Enter a username" required autofocus>
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="mail"
                           placeholder="john@example.com" required>
                </div>
            </div>

            <!-- Role -->
            <div class="form-group">
                <label for="role">Account Type</label>
                <div class="input-wrapper">
                    <i class="fas fa-shield-alt"></i>
                    <select id="role" name="role" class="with-icon" onchange="togglePinField()">
                        <option value="USER">User</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>
            </div>

            <!-- Admin PIN (Hidden by default - shows only when ADMIN selected) -->
            <div class="form-group" id="pinFieldGroup" style="display: none;">
                <label for="adminPin">Admin PIN</label>
                <div class="input-wrapper">
                    <i class="fas fa-key"></i>
                    <input type="password" id="adminPin" name="adminPin"
                           placeholder="Enter 4-digit admin PIN" maxlength="4">
                </div>
                <small style="color: #999; margin-top: 5px; display: block;">Required to create admin account</small>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password"
                           placeholder="Create a password" required oninput="checkStrength(this.value)">
                </div>
                <div class="strength-bar" id="strengthBar">
                    <span id="s1"></span>
                    <span id="s2"></span>
                    <span id="s3"></span>
                    <span id="s4"></span>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           placeholder="Repeat your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-signup">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="divider">
            Already have an account? <a href="/login" th:href="@{/login}">Login</a>
        </div>

<!--        <div class="info-box">-->
<!--            <small><i class="fas fa-info-circle"></i> To our beloved users</small>-->
<!--            <strong>This project is still under work!</strong>-->
<!--        </div>-->
        <div class="footer-text">
            <i class="fas fa-shield-alt"></i> Secure Admin Portal
        </div>
    </div>
    <div class="copyright" style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
        ©2026 Twitto. All rights reserved.<br>
        <small style="color: #87CEEB; font-size: 10px; font-weight: 500;">Developed by <a href="https://www.linkedin.com/public-profile/settings?trk=d_flagship3_profile_self_view_public_profile" target="_blank" rel="noopener noreferrer" style="color: #87CEEB; font-weight:bold; text-decoration:none;">Ashbir!</a></small>
    </div>
</div>

<script>
    function togglePinField() {
        const roleSelect = document.getElementById('role');
        const pinFieldGroup = document.getElementById('pinFieldGroup');
        const adminPinInput = document.getElementById('adminPin');

        if (roleSelect.value === 'ADMIN') {
            pinFieldGroup.style.display = 'block';
            adminPinInput.required = true;
        } else {
            pinFieldGroup.style.display = 'none';
            adminPinInput.required = false;
            adminPinInput.value = '';
        }
    }

    function checkStrength(val) {
        const bars = [document.getElementById('s1'), document.getElementById('s2'),
                      document.getElementById('s3'), document.getElementById('s4')];
        const label = document.getElementById('strengthLabel');
        bars.forEach(b => { b.className = ''; });

        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const classes = ['weak', 'medium', 'medium', 'strong'];
        const labels  = ['', 'Weak', 'Fair', 'Good', 'Strong'];
        const colors  = ['', '#e74c3c', '#f39c12', '#f39c12', '#27ae60'];

        for (let i = 0; i < score; i++) bars[i].className = classes[score - 1];
        label.textContent = val.length ? labels[score] : '';
        label.style.color = colors[score];
    }

    function validateForm() {
        const pw  = document.getElementById('password').value;
        const cpw = document.getElementById('confirmPassword').value;
        const role = document.getElementById('role').value;
        const adminPin = document.getElementById('adminPin').value;

        if (pw !== cpw) {
            alert('Passwords do not match.');
            return false;
        }

        // Check PIN only if trying to create admin account
        if (role === 'ADMIN') {
            if (!adminPin) {
                alert('Admin PIN is required to create an admin account.');
                return false;
            }
            if (adminPin !== '1234') {
                alert('Invalid Admin PIN. Access denied.');
                return false;
            }
        }

        return true;
    }
</script>

</body>
</html>
